<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080" font-family="-apple-system, 'Poppins', 'Inter', sans-serif">
  <!-- Background -->
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="10%" r="70%">
      <stop offset="0%" stop-color="#75e9d2" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#75e9d2" stop-opacity="0.00"/>
    </radialGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111119"/>
      <stop offset="100%" stop-color="#0d0d14"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="#08080d"/>
  <rect width="1080" height="1080" fill="url(#bgGlow)"/>

  <!-- Top label -->
  <text x="540" y="96" text-anchor="middle" fill="#75e9d2" font-size="20" font-weight="600" letter-spacing="4" font-family="'Poppins', sans-serif">FREE FOR FOUNDER-LED DTC BRANDS</text>

  <!-- Title (68px to fit 1000px width at 800-weight Montserrat) -->
  <text x="540" y="170" text-anchor="middle" fill="#ffffff" font-size="68" font-weight="800" font-family="'Montserrat', sans-serif" letter-spacing="-2">AI Competitor Creative Audit</text>

  <!-- Subtitle -->
  <text x="540" y="220" text-anchor="middle" fill="#9494ad" font-size="24" font-weight="400">Ten deliverables. Cross-competitor synthesis. Delivered in an hour.</text>

  <!-- 10 cards: 2 cols × 5 rows -->
  <!-- Col1 x=40, Col2 x=560. w=480. h=112. row starts: 270, 396, 522, 648, 774 -->

  <g font-family="'Poppins', sans-serif">
    <!-- 01 Competitor Profiles -->
    <g transform="translate(40 270)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">01 · COMPETITOR PROFILES</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">Product positioning + target audience</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">Top products · positioning summary · assumed ICP for 3-5 brands</text>
    </g>

    <!-- 02 Meta Ad Library -->
    <g transform="translate(560 270)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">02 · META AD LIBRARY</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">Active creative + fatigue signals</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">30-day scan · hooks · formats · copy · estimated reach</text>
    </g>

    <!-- 03 Google SERP Scan -->
    <g transform="translate(40 396)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">03 · GOOGLE SERP SCAN</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">Paid search copy + sitelinks</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">Brand + category head-term + 5 commercial-intent terms</text>
    </g>

    <!-- 04 Social Content -->
    <g transform="translate(560 396)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">04 · SOCIAL CONTENT</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">Top posts + engagement patterns</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">LinkedIn, X, Instagram, TikTok · 30-day window</text>
    </g>

    <!-- 05 Hook + Angle Taxonomy -->
    <g transform="translate(40 522)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">05 · HOOK + ANGLE TAXONOMY</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">Categorised angle families</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">Social proof · urgency · identity · authority · transformation</text>
    </g>

    <!-- 06 Production Style -->
    <g transform="translate(560 522)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">06 · PRODUCTION STYLE</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">UGC vs studio vs founder-voice mix</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">Who's using what · format mix · production feasibility</text>
    </g>

    <!-- 07 CTA Pattern Analysis -->
    <g transform="translate(40 648)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">07 · CTA PATTERN ANALYSIS</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">Dominant CTAs + conversion framing</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">Shop Now · Learn More · Download · Subscribe · frequency</text>
    </g>

    <!-- 08 Whitespace Map -->
    <g transform="translate(560 648)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">08 · WHITESPACE MAP</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">Angles nobody in the category runs</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">Hooks the ICP wants · no competitor delivers</text>
    </g>

    <!-- 09 Starter Ad Briefs -->
    <g transform="translate(40 774)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">09 · STARTER AD BRIEFS</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">10-15 ready-to-shoot ad briefs</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">Ranked by ICE · hook + script + format per angle</text>
    </g>

    <!-- 10 Cross-competitor synthesis (teal flagship) -->
    <g transform="translate(560 774)">
      <rect width="480" height="112" rx="14" fill="#75e9d2" stroke="#75e9d2" stroke-width="1"/>
      <text x="24" y="40" fill="#08080d" font-size="14" font-weight="700" letter-spacing="3">10 · CROSS-COMPETITOR SYNTHESIS</text>
      <text x="24" y="74" fill="#08080d" font-size="22" font-weight="700">Angle patterns + whitespace opportunities</text>
      <text x="24" y="98" fill="#08080d" font-size="15" opacity="0.80">Correlated hooks across 3-5 brands · top 10-15 starter briefs</text>
    </g>
  </g>

  <!-- Bottom bar: URL + CTA -->
  <g transform="translate(0 924)">
    <line x1="40" y1="0" x2="1040" y2="0" stroke="#1a1a24" stroke-width="1"/>
    <text x="40" y="54" fill="#9494ad" font-size="20" font-weight="500">Delivered as one Word doc + markdown source in your GitHub repo.</text>
    <text x="40" y="104" fill="#ffffff" font-size="36" font-weight="700" font-family="'Montserrat', sans-serif" letter-spacing="-0.5">entir<tspan fill="#75e9d2">ecommerce.ai</tspan><tspan fill="#9494ad">/playbooks/competitor-creative-audit</tspan></text>
  </g>
</svg>
